<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | Soul Bead</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { padding: 2rem; background: var(--ink); color: var(--white); }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .admin-title { font-size: 1.5rem; color: var(--accent); }
    .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; }
    .tab-btn { padding: 0.5rem 1.5rem; background: var(--surface); border: 1px solid var(--border); color: var(--white); border-radius: 8px; cursor: pointer; transition: 0.3s; }
    .tab-btn.active { background: var(--accent); color: var(--ink); border-color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .data-table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
    .data-table th, .data-table td { padding: 0.75rem; border: 1px solid var(--border); text-align: right; }
    .data-table th { background: var(--surface); color: var(--accent); }
    
    .action-btn { padding: 0.3rem 0.8rem; border: none; border-radius: 5px; cursor: pointer; font-family: 'Tajawal'; font-size: 0.8rem; margin-inline-end: 0.5rem; }
    .btn-edit { background: var(--surface2); color: var(--white); border: 1px solid var(--border2); }
    .btn-delete { background: rgba(255, 50, 50, 0.2); color: #ff5555; border: 1px solid rgba(255, 50, 50, 0.5); }
    .btn-add { background: var(--accent); color: var(--ink); font-weight: bold; padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 1rem; }
    
    .save-section { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); text-align: center; }
    .btn-save { background: var(--accent2); color: var(--ink); font-weight: bold; font-size: 1.2rem; padding: 1rem 2rem; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; }
    .btn-save:hover { transform: scale(1.05); }

    /* Modal */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--ink2); padding: 2rem; border-radius: 12px; width: 400px; max-width: 90%; border: 1px solid var(--border); }
    .modal h3 { margin-bottom: 1rem; color: var(--accent); }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--muted); font-size: 0.9rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--white); font-family: 'Tajawal'; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem; }
    .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
    .btn-confirm { background: var(--accent); color: var(--ink); border: none; padding: 0.5rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <div class="admin-header">
    <div class="admin-title">لوحة التحكم ✦ Soul Bead</div>
    <a href="index.html" style="color: var(--muted); text-decoration: none;">← العودة للموقع</a>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('products')">المنتجات</button>
    <button class="tab-btn" onclick="switchTab('categories')">المجموعات</button>
  </div>

  <!-- المنتجات -->
  <div id="tab-products" class="tab-content active">
    <button class="btn-add" onclick="openProductModal()">+ إضافة منتج جديد</button>
    <table class="data-table" id="productsTable">
      <thead>
        <tr>
          <th>الصورة</th>
          <th>الاسم</th>
          <th>السعر</th>
          <th>المجموعة</th>
          <th>إجراءات</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- المجموعات -->
  <div id="tab-categories" class="tab-content">
    <button class="btn-add" onclick="openCategoryModal()">+ إضافة مجموعة جديدة</button>
    <table class="data-table" id="categoriesTable">
      <thead>
        <tr>
          <th>المعرف (ID)</th>
          <th>الاسم</th>
          <th>إجراءات</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="save-section">
    <button class="btn-save" onclick="saveAndDownload()">حفظ التعديلات وتنزيل products.js</button>
    <p style="color: var(--muted); margin-top: 1rem; font-size: 0.9rem;">بعد التنزيل، قم باستبدال الملف القديم في مجلد js/data/</p>
  </div>

  <!-- نافذة إضافة/تعديل منتج -->
  <div class="modal" id="productModal">
    <div class="modal-content">
      <h3 id="pModalTitle">إضافة منتج</h3>
      <input type="hidden" id="pId">
      <div class="form-group">
        <label>اسم المنتج</label>
        <input type="text" id="pName">
      </div>
      <div class="form-group">
        <label>السعر</label>
        <input type="number" id="pPrice">
      </div>
      <div class="form-group">
        <label>المجموعة</label>
        <select id="pCat"></select>
      </div>
      <div class="form-group">
        <label>رابط الصورة (مثال: new/- (1) أو 21)</label>
        <input type="text" id="pImg">
      </div>
      <div class="form-group">
        <label>علامة مميزة (اختياري: new, hot, bestseller)</label>
        <input type="text" id="pTag">
      </div>
      <div class="form-group">
        <label>الوصف</label>
        <textarea id="pDesc" rows="3"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('productModal')">إلغاء</button>
        <button class="btn-confirm" onclick="saveProduct()">حفظ</button>
      </div>
    </div>
  </div>

  <!-- نافذة إضافة/تعديل مجموعة -->
  <div class="modal" id="categoryModal">
    <div class="modal-content">
      <h3 id="cModalTitle">إضافة مجموعة</h3>
      <input type="hidden" id="cOldId">
      <div class="form-group">
        <label>المعرف (ID) - بالإنجليزية وبدون مسافات (مثال: decor)</label>
        <input type="text" id="cId">
      </div>
      <div class="form-group">
        <label>الاسم (يظهر للعميل)</label>
        <input type="text" id="cName">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('categoryModal')">إلغاء</button>
        <button class="btn-confirm" onclick="saveCategory()">حفظ</button>
      </div>
    </div>
  </div>

  <script src="js/data/products.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
